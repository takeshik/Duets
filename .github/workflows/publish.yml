name: Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      packages: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # required for Nerdbank.GitVersioning

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore --verbosity normal

      - name: Build
        run: dotnet build --no-restore -c Release --verbosity normal

      - name: Resolve latest JS asset versions
        run: |
          BABEL_VER=$(curl -sf https://registry.npmjs.org/%40babel%2Fstandalone/latest | jq -r .version)
          TS_VER=$(curl -sf https://registry.npmjs.org/typescript/latest | jq -r .version)
          echo "BABEL_VERSION=$BABEL_VER" >> "$GITHUB_ENV"
          echo "TS_VERSION=$TS_VER" >> "$GITHUB_ENV"

      - name: Cache JS test assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/duets-test-assets
          key: test-assets-babel-${{ env.BABEL_VERSION }}-ts-${{ env.TS_VERSION }}

      - name: Test
        run: dotnet test --no-build -c Release -- --report-trx

      - name: Report test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always()
        with:
          name: xUnit Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx

      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: echo "PACK_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Pack (release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: dotnet pack --no-build -c Release -o ./artifacts /p:Version=${{ env.PACK_VERSION }}

      - name: Pack (snapshot)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: dotnet pack --no-build -c Release -o ./artifacts

      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
